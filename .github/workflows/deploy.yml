name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: summit-command-center/package-lock.json
      - run: npm ci
        working-directory: summit-command-center
      - run: npm run build
        working-directory: summit-command-center
        env:
          VITE_GITHUB_OWNER: ${{ secrets.VITE_GITHUB_OWNER }}
          VITE_GITHUB_REPO: ${{ secrets.VITE_GITHUB_REPO }}
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_APP_PASSWORD: ${{ secrets.VITE_APP_PASSWORD }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: summit-command-center/dist
      - uses: actions/deploy-pages@v4
        id: deployment
